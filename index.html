<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Strategy Workshop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1f2937;
  --surface3: #374151;
  --border: #2d3748;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent2: #6366f1;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --cyan: #06b6d4;
  --orange: #f97316;
  --navy: #1e3a5f;
  --status-none: #374151;
  --status-progress: #1e3a5f;
  --status-done: #064e3b;
  --status-blocked: #7f1d1d;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── HEADER ─── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-logo span { color: var(--text); }
.header-company {
  font-size: 13px;
  color: var(--text2);
  border-left: 1px solid var(--border);
  padding-left: 16px;
}
.header-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; border-color: #2563eb; color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px; width: 32px; justify-content: center; }
.btn-success { background: var(--green); border-color: var(--green); color: #fff; }
.btn-success:hover { background: #059669; color: #fff; }
.btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.btn-danger:hover { background: #dc2626; color: #fff; }

/* ─── NAV TABS ─── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 12px 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-tab:hover { color: var(--text2); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
}

/* ─── BREADCRUMB ─── */
.breadcrumb {
  padding: 10px 20px;
  font-size: 12px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}
.breadcrumb-item { cursor: pointer; color: var(--text2); }
.breadcrumb-item:hover { color: var(--accent); }
.breadcrumb-sep { color: var(--text3); }

/* ─── MAIN CONTENT ─── */
.main { padding: 20px; max-width: 1400px; margin: 0 auto; }

/* ─── BOARD LAYOUT ─── */
.board {
  display: grid;
  gap: 16px;
}
.board-2 { grid-template-columns: repeat(2, 1fr); }
.board-3 { grid-template-columns: repeat(3, 1fr); }
.board-4 { grid-template-columns: repeat(4, 1fr); }

@media (max-width: 900px) {
  .board-4, .board-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .board-2, .board-3, .board-4 { grid-template-columns: 1fr; }
}

/* ─── COLUMN ─── */
.col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.col-header {
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: space-between;
}
.col-label {
  display: flex;
  align-items: center;
  gap: 8px;
}
.col-icon { font-size: 14px; }
.col-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

/* ─── CARD ─── */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}
.card:hover { border-color: var(--accent); background: var(--surface3); }
.card.status-not-started { border-left: 3px solid var(--status-none); }
.card.status-in-progress { border-left: 3px solid var(--accent); background: rgba(59,130,246,0.05); }
.card.status-complete { border-left: 3px solid var(--green); background: rgba(16,185,129,0.05); }
.card.status-blocked { border-left: 3px solid var(--red); background: rgba(239,68,68,0.05); }

.card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-sub { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.tag-progress { background: rgba(59,130,246,0.2); color: var(--accent); }
.tag-done { background: rgba(16,185,129,0.2); color: var(--green); }
.tag-blocked { background: rgba(239,68,68,0.2); color: var(--red); }
.tag-none { background: rgba(100,116,139,0.2); color: var(--text3); }
.tag-kpi { background: rgba(245,158,11,0.2); color: var(--yellow); }
.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

/* ─── METRIC CARD ─── */
.metric-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.metric-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.metric-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.metric-sub { font-size: 11px; color: var(--text3); }

/* ─── SECTION TITLE ─── */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section { margin-bottom: 28px; }

/* ─── WIDE CARD (for values, purpose etc) ─── */
.wide-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.wide-card-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wide-card-content { color: var(--text); font-size: 14px; line-height: 1.6; }

/* ─── BHAG CARD ─── */
.bhag-card {
  background: linear-gradient(135deg, #1e3a5f 0%, #1a1f35 100%);
  border: 1px solid #3b82f6;
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.bhag-card::before {
  content: '🚀';
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 40px;
  opacity: 0.3;
}
.bhag-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--cyan);
  margin-bottom: 8px;
}
.bhag-text {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  line-height: 1.4;
  max-width: 80%;
}
.bhag-year {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text2);
}

/* ─── HEDGEHOG ─── */
.hedgehog-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
@media (max-width: 700px) { .hedgehog-grid { grid-template-columns: 1fr; } }
.hedgehog-circle {
  background: var(--surface);
  border: 2px solid;
  border-radius: 50%;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.hedgehog-circle:nth-child(1) { border-color: var(--accent); }
.hedgehog-circle:nth-child(2) { border-color: var(--green); }
.hedgehog-circle:nth-child(3) { border-color: var(--yellow); }
.hedgehog-icon { font-size: 24px; margin-bottom: 8px; }
.hedgehog-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.hedgehog-circle:nth-child(1) .hedgehog-label { color: var(--accent); }
.hedgehog-circle:nth-child(2) .hedgehog-label { color: var(--green); }
.hedgehog-circle:nth-child(3) .hedgehog-label { color: var(--yellow); }
.hedgehog-text { font-size: 12px; color: var(--text2); line-height: 1.4; }

/* ─── TABLE ─── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.tbl td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(45,55,72,0.5);
  color: var(--text);
  vertical-align: top;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(59,130,246,0.03); }
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  overflow-x: auto;
}

/* ─── STATUS SELECT ─── */
.status-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ─── ONE PAGE VIEW ─── */
#opsp-view {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.opsp-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  min-height: 600px;
  border: 1px solid var(--border);
}
@media (max-width: 1100px) {
  .opsp-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 700px) {
  .opsp-grid { grid-template-columns: repeat(2, 1fr); }
}
.opsp-col {
  border-right: 1px solid var(--border);
  min-width: 0;
}
.opsp-col:last-child { border-right: none; }
.opsp-col-header {
  padding: 10px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 2px solid;
  text-align: center;
}
.opsp-col:nth-child(1) .opsp-col-header { color: var(--purple); border-color: var(--purple); background: rgba(139,92,246,0.08); }
.opsp-col:nth-child(2) .opsp-col-header { color: var(--cyan); border-color: var(--cyan); background: rgba(6,182,212,0.08); }
.opsp-col:nth-child(3) .opsp-col-header { color: var(--green); border-color: var(--green); background: rgba(16,185,129,0.08); }
.opsp-col:nth-child(4) .opsp-col-header { color: var(--yellow); border-color: var(--yellow); background: rgba(245,158,11,0.08); }
.opsp-col:nth-child(5) .opsp-col-header { color: var(--accent); border-color: var(--accent); background: rgba(59,130,246,0.08); }
.opsp-col:nth-child(6) .opsp-col-header { color: var(--orange); border-color: var(--orange); background: rgba(249,115,22,0.08); }
.opsp-col:nth-child(7) .opsp-col-header { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.08); }
.opsp-col-body { padding: 8px; font-size: 11px; }
.opsp-section { margin-bottom: 10px; }
.opsp-section-title { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.opsp-item { padding: 3px 0; color: var(--text2); border-bottom: 1px dotted rgba(45,55,72,0.5); font-size: 11px; }
.opsp-item:last-child { border-bottom: none; }
.opsp-highlight {
  background: rgba(59,130,246,0.1);
  border-radius: 4px;
  padding: 6px;
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--text);
  font-weight: 500;
  border-left: 2px solid var(--accent);
}
.opsp-title-bar {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.opsp-company { font-size: 16px; font-weight: 700; }
.opsp-date { font-size: 12px; color: var(--text3); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ─── FORM ─── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  padding: 8px 12px;
  font-family: inherit;
  transition: var(--transition);
}
.form-input:focus { outline: none; border-color: var(--accent); }
textarea.form-input { resize: vertical; min-height: 80px; }
select.form-input { cursor: pointer; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13px;
  box-shadow: var(--shadow);
  z-index: 2000;
  animation: slideUp 0.3s ease;
  max-width: 300px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ─── PROGRESS BAR ─── */
.progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

/* ─── CRITICAL NUMBER ─── */
.critical-number {
  background: linear-gradient(135deg, #1e3a5f 0%, #1a1f35 100%);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.cn-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--cyan); margin-bottom: 6px; }
.cn-value { font-size: 16px; font-weight: 700; color: #fff; }
.cn-owner { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* ─── FILTER BAR ─── */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-chip {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
}
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-chip:hover { border-color: var(--accent); }

/* ─── QUARTER SELECTOR ─── */
.quarter-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.q-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  transition: var(--transition);
}
.q-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.q-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* ─── LOADING ─── */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text3); gap: 12px; font-size: 14px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── SAVE INDICATOR ─── */
.save-indicator { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.save-dot.unsaved { background: var(--yellow); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ─── SIDEBAR PANEL ─── */
.sidebar-layout { display: grid; grid-template-columns: 1fr 300px; gap: 16px; }
@media (max-width: 900px) { .sidebar-layout { grid-template-columns: 1fr; } }
.sidebar { display: flex; flex-direction: column; gap: 12px; }
.sidebar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.sidebar-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 12px; }

/* ─── DRAG & DROP ─── */
.dragging { opacity: 0.5; transform: scale(0.98); }
.drag-over { border-color: var(--accent) !important; background: rgba(59,130,246,0.08) !important; }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 32px;
  color: var(--text3);
  font-size: 13px;
}
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* ─── VERSION HISTORY ─── */
.version-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.version-item:last-child { border-bottom: none; }
.version-time { color: var(--text2); }
.version-id { color: var(--text3); font-family: monospace; }

/* ─── PRINT STYLES ─── */
@media print {
  .header, .nav, .breadcrumb, .btn, .filter-bar, .quarter-selector { display: none !important; }
  body { background: white; color: black; }
  .opsp-grid { color: black; }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }

async function savePlan() {
  try {
    markSaving();
    const r = await fetch(`${API}/plan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(plan)
    });
    const j = await r.json();
    if (j.ok) {
      markSaved();
      showToast('✅ Plan saved (v' + j.versionId + ')');
    } else {
      showToast('Save failed: ' + j.error, 'error');
    }
  } catch (e) {
    showToast('Save error: ' + e.message, 'error');
  }
}

function markSaving() {
  document.getElementById('save-status').textContent = 'Saving...';
}
function markSaved() {
  unsaved = false;
  document.getElementById('save-dot').className = 'save-dot';
  document.getElementById('save-status').textContent = 'Saved';
}

// ─── TAB ROUTING ───────────────────────────────────────────────────────────

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  if (!plan) return;
  const el = document.getElementById('tab-content');
  switch (tab) {
    case 'vision':    el.innerHTML = renderVision(); break;
    case 'annual':    el.innerHTML = renderAnnual(); break;
    case 'quarterly': el.innerHTML = renderQuarterly(); break;
    case 'monthly':   el.innerHTML = renderMonthly(); break;
    case 'onepage':   el.innerHTML = renderOnePage(); break;
    case 'strata':    el.innerHTML = renderStrata(); break;
  }
  attachDragDrop();
}

// ─── STATUS HELPERS ────────────────────────────────────────────────────────

function statusTag(s) {
  const map = {
    'not-started': ['tag-none','Not Started'],
    'in-progress': ['tag-progress','In Progress'],
    'complete': ['tag-done','Complete'],
    'blocked': ['tag-blocked','Blocked']
  };
  const [cls, label] = map[s] || ['tag-none','Unknown'];
  return `<span class="tag ${cls}">${label}</span>`;
}

function statusClass(s) {
  return 'status-' + (s||'not-started').replace('_','-');
}

function ownerAvatar(ownerStr) {
  if (!ownerStr || !plan) return '';
  const name = ownerStr.split('/')[0].trim();
  const member = plan.team.find(t => t.name.toLowerCase().includes(name.toLowerCase()));
  if (!member) return `<span class="avatar" style="background:var(--surface3)">${name.slice(0,2).toUpperCase()}</span>`;
  return `<span class="avatar" style="background:${member.color}" title="${member.name}">${member.initials}</span>`;
}

function statusSelect(currentStatus, onchange) {
  return `<select class="status-select" onchange="${onchange}">
    <option value="not-started" ${currentStatus==='not-started'?'selected':''}>Not Started</option>
    <option value="in-progress" ${currentStatus==='in-progress'?'selected':''}>In Progress</option>
    <option value="complete" ${currentStatus==='complete'?'selected':''}>Complete</option>
    <option value="blocked" ${currentStatus==='blocked'?'selected':''}>Blocked</option>
  </select>`;
}

function renderProgressBar(rocks) {
  if (!rocks.length) return '<div style="color:var(--text3);font-size:12px">No rocks yet</div>';
  const counts = { complete: 0, 'in-progress': 0, 'not-started': 0, blocked: 0 };
  rocks.forEach(r => { counts[r.status] = (counts[r.status]||0) + 1; });
  const total = rocks.length;
  const pct = Math.round((counts.complete / total) * 100);
  return `
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span>Progress</span><span style="color:var(--green)">${pct}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:var(--green)"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">
      <div style="color:var(--green)">✓ ${counts.complete} Complete</div>
      <div style="color:var(--accent)">⟳ ${counts['in-progress']} In Progress</div>
      <div style="color:var(--text3)">○ ${counts['not-started']||0} Not Started</div>
      <div style="color:var(--red)">✗ ${counts.blocked||0} Blocked</div>
    </div>`;
}

// ─── MODAL SYSTEM ──────────────────────────────────────────────────────────

function openModal(title, bodyHTML, onSubmit, footerHTML) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  if (footerHTML) document.getElementById('modal-footer').innerHTML = footerHTML;
  else document.getElementById('modal-footer').innerHTML = '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitModal()">Save</button>';
  document.getElementById('modal').style.display = 'flex';
  currentModal = onSubmit;
  // Focus first input
  setTimeout(() => {
    const inp = document.querySelector('#modal-body input, #modal-body textarea, #modal-body select');
    if (inp) inp.focus();
  }, 100);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  currentModal = null;
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function submitModal() {
  if (currentModal) {
    const result = currentModal();
    if (result !== false) {
      closeModal();

function filterRocks(chip, status) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  const board = document.getElementById('annual-rocks-board');
  if (!board) return;
  board.querySelectorAll('.card').forEach(card => {
    if (status === 'all') card.style.display = '';
    else card.style.display = card.classList.contains('status-'+status) ? '' : 'none';
  });
}

async function showVersions() {
  showToast('📋 Version history not available in standalone mode', 'info');
  return;
}
async function _showVersions_disabled() {
  try {
    const r = await fetch(`${API}/versions`);
    const j = await r.json();
    const versions = j.versions || [];
    const rowsHTML = versions.slice(0,20).map(v => `
      <div class="version-item">
        <div>
          <div class="version-time">${new Date(v.savedAt).toLocaleString()}</div>
          <div class="version-id">#${v.id}</div>
        </div>
        <button class="btn btn-sm" onclick="restoreVersion('${v.id}')">Restore</button>
      </div>
    `).join('') || '<div class="empty-state">No versions yet</div>';
    
    openModal('Version History', `
      <div style="max-height:400px;overflow-y:auto;margin:-20px">
        ${rowsHTML}
      </div>
    `, null, '<button class="btn" onclick="closeModal()">Close</button>');
  } catch (e) {
    showToast('Failed to load versions', 'error');
  }
}

async function restoreVersion(id) {
  if (!confirm('Restore this version? Current plan will be saved as a new version first.')) return;
  try {
    await savePlan(); // Save current first
    const r = await fetch(`${API}/restore/${id}`, { method: 'POST' });
    const j = await r.json();
    if (j.ok) {
      await loadPlan();
      closeModal();
      showToast('✅ Version restored');
    }
  } catch (e) {
    showToast('Restore failed: ' + e.message, 'error');
  }
}

// ─── EXPORT ────────────────────────────────────────────────────────────────

function printOPSP() {
  showTab('onepage');
  setTimeout(() => window.print(), 500);
}

async function exportPDF() {
  showTab('onepage');
  showToast('Preparing screenshot...', 'success');
  setTimeout(async () => {
    try {
      const el = document.getElementById('opsp-view');
      const canvas = await html2canvas(el, { backgroundColor: '#111827', scale: 2 });
      const link = document.createElement('a');
      link.download = `OPSP-${plan.meta.company}-${new Date().toISOString().slice(0,10)}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('✅ Screenshot downloaded');
    } catch (e) {
      showToast('Export error: ' + e.message, 'error');
    }
  }, 800);
}

// ─── DRAG & DROP ───────────────────────────────────────────────────────────

function attachDragDrop() {
  document.querySelectorAll('.card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSource = card;
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragSource = null;
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (dragSource && dragSource !== card) {
        const parent = card.parentNode;
        const sourceIdx = [...parent.children].indexOf(dragSource);
        const targetIdx = [...parent.children].indexOf(card);
        parent.insertBefore(dragSource, sourceIdx < targetIdx ? card.nextSibling : card);
        // Reorder plan data
        reorderRocks(card.dataset.type, sourceIdx, targetIdx);
      }
    });
  });
}

function reorderRocks(type, from, to) {
  if (type === 'annual-rock') {
    const arr = plan.annual.rocks;
    const item = arr.splice(from, 1)[0];
    arr.splice(to, 0, item);
    markUnsaved();
  }
}

// ─── TOAST ─────────────────────────────────────────────────────────────────

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); savePlan(); }
  if (e.key === 'Escape') closeModal();
});

// ─── INIT ──────────────────────────────────────────────────────────────────

loadPlan();
</script>
